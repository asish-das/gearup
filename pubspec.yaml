name: gearup
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cached_network_image: ^3.4.1
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.7.0
  firebase_core: ^3.15.2
  firebase_storage: ^12.4.2
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  font_awesome_flutter: ^10.12.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_fonts: ^8.0.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.0
  pdf: ^3.11.1
  path_provider: ^2.1.3
  universal_html: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#191022"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#191022"
  image: "assets/images/logo.png"
  android: true
  ios: true
